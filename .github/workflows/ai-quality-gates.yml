name: AI Quality Gates

on:
  pull_request:
    paths:
      - 'scripts/lib/**'
      - 'scripts/prompt-contracts.json'
      - 'src/lib/aiPrompts.ts'
      - 'src/lib/promptContracts.ts'
      - 'scripts/check-prompt-contracts.mjs'
      - 'scripts/check-prompt-scenarios.mjs'
      - 'scripts/ai-eval-gates.mjs'
      - 'scripts/check-weekly-distribution-logic.mjs'
      - 'scripts/run-cohort-replay-benchmark.mjs'
      - 'scripts/prompt-behavior-scenarios.json'
      - 'docs/AI_CONTEXT.md'
      - 'docs/ai-improvement/persona-behavior-contract.md'
      - 'docs/ai-improvement/prompt-regression-suite.md'
      - 'app/api/ai/**'
      - 'package.json'
      - '.github/workflows/ai-quality-gates.yml'
  push:
    branches:
      - main
      - master

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    concurrency:
      group: ai-quality-gates-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run offline tests
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
        run: bun run test:offline

      - name: Build
        run: bun run build

      - name: Run AI gate checks
        run: bun run test:ai-gates

      - name: Run AI evaluation gates
        run: bun run test:ai-evals

      - name: Run cohort replay benchmark
        env:
          BASELINE_ADHERENCE: '3.0'
          CANDIDATE_ADHERENCE: '3.0'
          BASELINE_SAFETY_INCIDENTS: '1'
          CANDIDATE_SAFETY_INCIDENTS: '1'
        run: bun run test:cohort-replay
