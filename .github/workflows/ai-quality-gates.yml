name: AI Quality Gates

on:
  pull_request:
    paths:
      - 'src/lib/aiPrompts.ts'
      - 'src/lib/promptContracts.ts'
      - 'scripts/check-prompt-contracts.mjs'
      - 'app/api/ai/**'
      - 'package.json'
      - '.github/workflows/ai-quality-gates.yml'
  push:
    branches:
      - main
      - master

jobs:
  prompt-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run AI gate checks
        run: npm run test:ai-gates
